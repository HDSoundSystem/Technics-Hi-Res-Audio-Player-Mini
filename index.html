<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Technics High Resolution Audio Player|Mini</title>
    <meta name="keywords" content="Technics, Hi-Res Audio, Audio Player, Mini, HiFi, Touchscreen, Music Player, Web App, flac, mp3, music">
    <meta name="author" content="Yohann Zaoui">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="apple-touch-icon" href="img/favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

<div class="player-container">
    <div class="header-line">
        <img src="img/Technics_logo.png" alt="Technics" class="brand-logo-img" onclick="toggleTheme()">
        <span class="model-text">HIGH RESOLUTION AUDIO PLAYER</span>
    </div>

    <div class="display-panel">
        <div class="status-line"><span id="status-function">NO TRACK</span></div>
        <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
            <div id="timer" class="time-display">
                <span id="m1" class="digit">0</span><span id="m2" class="digit">0</span><span class="sep">:</span><span id="s1" class="digit">0</span><span id="s2" class="digit">0</span>
            </div>
            <div class="side-indicators">
                <div style="display:flex; gap:10px;"><div id="ind-shuffle" class="ind">RANDOM</div><div id="ind-ab" class="ind">A-B</div></div>
                <div id="format-info">---</div>
                <div id="ind-repeat1" class="ind">Repeat 1</div>
                <div id="ind-repeatAll" class="ind">Repeat All</div>
            </div>
        </div>
        <div id="file-info-line" onclick="openArtModal()">- - - - -</div>
        <div id="track-grid" class="track-grid" onclick="openPlaylist()"></div>
        <div style="height:70px; margin-top:10px;"><canvas id="vu-meter" width="800" height="120" style="width:100%; height:100%;"></canvas></div>
    </div>

    <div class="num-pad">
        <button onclick="pressDigit(1)">1</button><button onclick="pressDigit(2)">2</button><button onclick="pressDigit(3)">3</button><button onclick="pressDigit(4)">4</button><button onclick="pressDigit(5)">5</button>
        <button onclick="pressDigit(6)">6</button><button onclick="pressDigit(7)">7</button><button onclick="pressDigit(8)">8</button><button onclick="pressDigit(9)">9</button><button onclick="pressDigit(0)">0</button>
    </div>

    <div class="controls-grid">
        <button onclick="handlePlay()"><i class="fa-solid fa-play"></i></button>
        <button onclick="handlePause()"><i class="fa-solid fa-pause"></i></button>
        <button onclick="prevTrack()"><i class="fa-solid fa-backward-step"></i></button>
        <button onclick="nextTrack()"><i class="fa-solid fa-forward-step"></i></button>
        <button onclick="handleStop()"><i class="fa-solid fa-stop"></i></button>
        <button onclick="toggleTime()">Time</button>
    </div>
    <div class="controls-grid-4">
        <button onclick="runAutoCue()">Auto Cue</button><button onclick="runPeak()">Peak</button><button onclick="skip(-10)">-10s</button><button onclick="skip(10)">+10s</button>
    </div>
    <div class="controls-grid-4">
        <button onclick="toggleShuffle()">RANDOM</button><button onclick="toggleRepeat()">Repeat</button><button onclick="handleAB()">A-B</button><button onclick="toggleVUMode()">VU</button>
    </div>
    <div class="controls-grid-4">
        <button style="padding:15px" onclick="fileIn.click()">Open</button>
        <button style="padding:15px" onclick="changeVolume(-0.1)" onmouseenter="showVolume()" onmouseleave="updateStatusText()">VOL -</button>
        <button style="padding:15px" onclick="changeVolume(0.1)" onmouseenter="showVolume()" onmouseleave="updateStatusText()">VOL +</button>
        <button style="padding:15px" onclick="location.reload()">Close</button>
    </div>
    
    <div class="shuttle-zone">
        <div class="shuttle-label">JOG SHUTTLE</div>
        <input type="range" id="shuttle" min="-10" max="10" value="0" oninput="doShuttle(this.value)" onchange="resetShuttle()">
    </div>
    <input type="file" id="file-in" style="display:none" accept="audio/*" multiple>
</div>

<div id="playlistModal" class="modal" onclick="closePlaylist()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="playlist-title">Track List</div>
        <div id="playlist-items-container"></div>
    </div>
</div>

<div id="artModal" class="modal" onclick="this.style.display='none'"><div class="modal-content"><img id="modalImg" src="img/Technics_logo.png"></div></div>
<audio id="audio" crossorigin="anonymous" playsinline></audio>

<script src="script.js"></script>

</body>
</html>
